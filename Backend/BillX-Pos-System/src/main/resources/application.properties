server.port=8080
spring.application.name=BillX-Pos-System

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/pos_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# JWT Configuration
# ===============================
jwt.secret=BillXSecretKey@2026BillXSecretKey@2026
jwt.expiration=86400000

# ===============================
# DevTools
# ===============================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
