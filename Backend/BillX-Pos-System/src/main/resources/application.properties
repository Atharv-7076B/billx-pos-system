server.port=8083
spring.application.name=BillX-Pos-System

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/pos_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:BillXSecretKey@2026BillXSecretKey@2026}
jwt.expiration=86400000

# ===============================
# CORS - allow all origins (JWT-based, no cookies)
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:5000}

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================
# DevTools
# ===============================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ===============================
# Logging
# ===============================
logging.level.com.BillX=INFO
logging.level.org.springframework.security=WARN
